# Publish wheels and sdist to PyPI. The package version always comes from
# `project.version` in pyproject.toml on the checked-out ref (typically master
# via workflow_dispatch, or a release tag).

name: Upload Python Package

on:
  # Publish whatever version is declared on master (no git tag required).
  workflow_dispatch:
  # Optional: tag a release as vX.Y.Z; the workflow publishes the tree at that tag.
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: pypi-publish
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"
      - name: Install and test
        run: |
          uv pip install --system -e ".[tests]"
          pytest

  publish:
    needs: test
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/master') ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"
      - name: Show version from pyproject.toml
        run: |
          python3 -c "import tomllib; v=tomllib.load(open('pyproject.toml','rb'))['project']['version']; print(f'Publishing AeonLang {v}')"
      - name: Build package
        run: uv build
      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: uv publish
